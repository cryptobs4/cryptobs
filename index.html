<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cryptobs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="https://cryptobs4.github.io/cryptobs/manifest.json">
 <link rel="icon" type="image/png" href="https://cryptobs4.github.io/cryptobs/icon-192.png">
<meta name="theme-color" content="#ffffff">

<!-- iOS (iPhone/iPad) -->

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cryptobs">
<link rel="apple-touch-icon" href="https://cryptobs4.github.io/cryptobs/icon-192.png">
</head>

<body>



 
<button id="installBtn" style="
  position: fixed;
  left: 16px;
  right: 16px;
  bottom: 16px;
  padding: 14px 16px;
  border: 0;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  display: none;
  z-index: 9999;
">
  Install CryptoBS
</button>

 <script>
  let deferredPrompt = null;
  const installBtn = document.getElementById("installBtn");

  // وقتی مرورگر اجازه نصب داد، دکمه را نشان بده
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();          // جلوگیری از بنر خودکار مرورگر
    deferredPrompt = e;          // ذخیره کردن event
    installBtn.style.display = "block";
  });

  // کلیک روی دکمه نصب
  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();     // نمایش پنجره نصب
    const choice = await deferredPrompt.userChoice;

    // بعد از انتخاب کاربر، دکمه را مخفی کن
    deferredPrompt = null;
    installBtn.style.display = "none";
  });

  // اگر نصب شد، دکمه را مخفی کن
  window.addEventListener("appinstalled", () => {
    installBtn.style.display = "none";
  });
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("https://cryptobs4.github.io/cryptobs/sw.js");
  }
</script>
</body>
</html>
